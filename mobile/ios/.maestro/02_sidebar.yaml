appId: com.unnamed.app
---
# Sidebar opens via the nav-bar button, shows its core sections, and closes
# via the explicit close button without leaving any residue on the chat screen.
- launchApp:
    permissions:
      notifications: deny
- tapOn: "split view horizontally left"
- assertVisible: "Search chats"
- assertVisible: "New chat"
- assertVisible: "Projects"
- assertVisible: "Inbox"
- assertVisible: "Settings"
- tapOn: "xmark"
- assertNotVisible: "New chat"
- assertVisible: "Chat"
