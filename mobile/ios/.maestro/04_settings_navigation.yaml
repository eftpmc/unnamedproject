appId: com.unnamed.app
---
# Settings is reached via the sidebar's avatar (top-right), pushed onto
# the shared nav stack like Projects, with a native back button.
- launchApp:
    permissions:
      notifications: deny
- tapOn: "split view horizontally left"
- tapOn: "Settings"
- assertVisible: "Settings"
- assertVisible: "Account"
- assertVisible: "Server"
- assertVisible: "Sign Out"
- tapOn: "Chat"
- assertVisible: "split view horizontally left"
- assertVisible: "Message..."
