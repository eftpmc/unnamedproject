<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>unnamedproject</title>
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var theme = stored === 'unnamed-light' || stored === 'unnamed-dark'
          ? stored
          : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'unnamed-light' : 'unnamed-dark');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
