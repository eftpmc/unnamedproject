map $http_accept $proxy_to_api {
    default         0;
    "~application/json" 1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Pure API routes — always proxy
    location ~ ^/(auth|sessions|messages|connections|executions|memory|scheduled-tasks|campaigns|pipelines)(/|$) {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Media/artifacts/research sub-paths always go to API
    location ~ ^/(projects|settings)/(media|artifacts|research)/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Ambiguous routes: proxy JSON requests, serve SPA for the rest
    location ~ ^/(projects|settings|documents|media|triggers) {
        if ($proxy_to_api) {
            proxy_pass http://server:3000;
        }
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
